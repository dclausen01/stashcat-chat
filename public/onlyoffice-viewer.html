<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dokument ansehen — BBZ Chat</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; font-family: system-ui, sans-serif; }
    #editor { width: 100%; height: 100%; }
    #loading {
      display: flex; align-items: center; justify-content: center;
      width: 100%; height: 100%;
      background: #f5f5f5; color: #555; font-size: 1.1rem;
    }
    #error {
      display: none; align-items: center; justify-content: center;
      width: 100%; height: 100%;
      background: #fff5f5; color: #c00; font-size: 1rem;
      padding: 2rem; text-align: center;
    }
  </style>
</head>
<body>
  <div id="loading">Dokument wird geladen...</div>
  <div id="error"></div>
  <div id="editor"></div>

  <script>
    (function () {
      const loadingEl = document.getElementById('loading');
      const errorEl = document.getElementById('error');

      function showError(msg) {
        loadingEl.style.display = 'none';
        errorEl.style.display = 'flex';
        errorEl.textContent = msg;
      }

      try {
        const hash = window.location.hash.slice(1);
        if (!hash) {
          showError('Keine Konfiguration gefunden. Bitte Dokument erneut öffnen.');
          return;
        }

        const { config, onlyofficeUrl } = JSON.parse(decodeURIComponent(atob(hash)));
        if (!config || !onlyofficeUrl) {
          showError('Ungültige Konfiguration.');
          return;
        }

        const script = document.createElement('script');
        script.src = onlyofficeUrl + '/web-apps/apps/api/documents/api.js';
        script.onerror = () => showError('OnlyOffice Document Server ist nicht erreichbar: ' + onlyofficeUrl);
        script.onload = () => {
          loadingEl.style.display = 'none';
          try {
            new DocsAPI.DocEditor('editor', config);
          } catch (e) {
            showError('Viewer konnte nicht gestartet werden: ' + e.message);
          }
        };
        document.head.appendChild(script);
      } catch (e) {
        showError('Fehler beim Laden: ' + e.message);
      }
    })();
  </script>
</body>
</html>
